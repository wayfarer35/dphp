name: Build and publish Docker image

on:
  workflow_dispatch:
    inputs:
      php_versions:
        description: "要构建的 PHP 版本，支持逗号或空格分隔，例如: 8.4,8.3"
        required: false
        default: "8.4"
      push_image:
        description: "是否推送到 GHCR"
        required: false
        type: boolean
        default: true
      verbose:
        description: "是否输出详细构建日志（可能触发 Actions 日志截断）"
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DOCKER_BUILDKIT: "1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.vars.outputs.versions }}
      push_image: ${{ steps.vars.outputs.push_image }}
    steps:
      - name: Resolve build matrix
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PHP_VERSIONS: ${{ github.event.inputs.php_versions }}
          INPUT_PUSH_IMAGE: ${{ github.event.inputs.push_image }}
        run: |
          set -euo pipefail

          RAW_INPUT="${INPUT_PHP_VERSIONS:-8.4}"
          if [ -z "$RAW_INPUT" ]; then
            RAW_INPUT="8.4"
          fi

          PUSH_IMAGE="${INPUT_PUSH_IMAGE:-true}"

          VERSIONS_JSON="$(printf '%s' "$RAW_INPUT" | tr ', ' '\n' | awk 'NF && !seen[$0]++' | jq -R . | jq -cs .)"

          echo "versions=$VERSIONS_JSON" >> "$GITHUB_OUTPUT"
          echo "push_image=$PUSH_IMAGE" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        php_version: ${{ fromJson(needs.prepare.outputs.versions) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show disk space before cleanup
        run: df -h

      - name: Free disk space on runner
        shell: bash
        run: |
          set -eux
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet || true
          docker system prune -af || true
          df -h

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show build command
        shell: bash
        env:
          TARGET_PHP_VERSION: ${{ matrix.php_version }}
          BUILD_VERBOSE: ${{ github.event.inputs.verbose }}
        run: |
          set -euo pipefail
          chmod +x ./build.sh

          args=("$TARGET_PHP_VERSION" "--image" "$IMAGE_NAME" "--dry-run")
          if [ "${BUILD_VERBOSE:-false}" = "true" ]; then
            args+=("-v")
          fi

          ./build.sh "${args[@]}"

      - name: Build image
        shell: bash
        env:
          TARGET_PHP_VERSION: ${{ matrix.php_version }}
          BUILD_VERBOSE: ${{ github.event.inputs.verbose }}
        run: |
          set -euo pipefail
          chmod +x ./build.sh

          log_file="build-${TARGET_PHP_VERSION}.log"
          export BUILD_LOG_FILE="$log_file"

          args=("$TARGET_PHP_VERSION" "--image" "$IMAGE_NAME")
          if [ "${BUILD_VERBOSE:-false}" = "true" ]; then
            args+=("-v")
          fi

          ./build.sh "${args[@]}"
          docker image inspect "${IMAGE_NAME}:${TARGET_PHP_VERSION}" >/dev/null

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-php${{ matrix.php_version }}
          path: build-${{ matrix.php_version }}.log
          if-no-files-found: ignore

      - name: Push image to GHCR
        if: needs.prepare.outputs.push_image == 'true'
        shell: bash
        env:
          TARGET_PHP_VERSION: ${{ matrix.php_version }}
        run: |
          set -euo pipefail
          docker push "${IMAGE_NAME}:${TARGET_PHP_VERSION}"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            docker tag "${IMAGE_NAME}:${TARGET_PHP_VERSION}" "${IMAGE_NAME}:${RELEASE_TAG}-php${TARGET_PHP_VERSION}"
            docker push "${IMAGE_NAME}:${RELEASE_TAG}-php${TARGET_PHP_VERSION}"
          fi

      - name: Show built images
        if: always()
        run: docker image ls "$IMAGE_NAME"